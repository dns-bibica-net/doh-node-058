name: Bulk Create Repositories
on:
  workflow_dispatch:
    inputs:
      pat:
        description: 'GitHub Personal Access Token (PAT) with repo scope'
        required: true
      source_repo:
        description: 'Source repository (e.g., bibicadotnet/Serverless-Edge-DNS-Gateway)'
        default: 'bibicadotnet/Serverless-Edge-DNS-Gateway'
        required: true
      prefix:
        description: 'Prefix for new repositories'
        default: 'doh-node'
        required: true
      count:
        description: 'Number of repositories to create'
        default: '100'
        required: true

jobs:
  create-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.source_repo }}
          path: source_code
          token: ${{ github.event.inputs.pat }}

      - name: Clean and Prepare Code
        run: |
          cd source_code
          # Remove workflows to prevent unwanted actions in secondary repos
          rm -rf .github/workflows
          # Re-initialize git for pushing to new repositories
          rm -rf .git
          git init
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .
          git commit -m "Initial commit (clean)"
          git branch -M main

      - name: Bulk Create and Push
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.event.inputs.pat }}
          script: |
            const prefix = context.payload.inputs.prefix;
            const count = parseInt(context.payload.inputs.count);
            const pat = context.payload.inputs.pat;
            
            const user = await github.rest.users.getAuthenticated();
            const owner = user.data.login;
            console.log(`Target account: ${owner}`);

            for (let i = 1; i <= count; i++) {
              const repoName = `${prefix}-${String(i).padStart(3, '0')}`;
              console.log(`Processing [${i}/${count}]: ${repoName}...`);

              try {
                // 1. Create Repository
                await github.rest.repos.createForAuthenticatedUser({
                  name: repoName,
                  private: false,
                  description: `Node ${i} for ${context.payload.inputs.source_repo}`,
                });
                console.log(`  - Created repo: ${repoName}`);

                // 2. Set Workflow Permissions to Read/Write
                await github.rest.actions.setWorkflowDefaultPermissionsRepository({
                  owner: owner,
                  repo: repoName,
                  default_workflow_permissions: 'write',
                  can_approve_pull_request_reviews: true
                });
                console.log(`  - Set workflow permissions`);

                // 3. Push code via Shell
                const remoteUrl = `https://x-access-token:${pat}@github.com/${owner}/${repoName}.git`;
                await exec.exec('git', ['push', remoteUrl, 'main', '--force'], { cwd: './source_code' });
                console.log(`  - Pushed code to ${repoName}`);

              } catch (error) {
                console.error(`  - Error processing ${repoName}: ${error.message}`);
              }
              
              await new Promise(r => setTimeout(r, 500));
            }

